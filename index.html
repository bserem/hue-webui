<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hue Control</title>
<style>
  /* A room at night: warm umber darkness, lit by the lamps themselves.
     Each card inherits --lamp, the real color of its bulb, and uses it
     for the glow edge, the background wash and the brightness track. */
  :root {
    --bg: #151009;
    --panel: #201813;
    --panel2: #2d2318;
    --line: #36291c;
    --text: #f4ecdf;
    --muted: #9d8e7b;
    --accent: #ffb15e;
    --lamp-off: #483e33;
    --track: #3c332a;
    --knob: #e9ddc9;
    --secondary-hover: #3a2d1f;
    --glow: rgba(255, 177, 94, 0.06);
    --radius: 12px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  }
  /* bright mode: the same room at midday */
  body.bright {
    --bg: #f3ecdf;
    --panel: #fbf7ee;
    --panel2: #ece2d0;
    --line: #ddd0bb;
    --text: #2b2118;
    --muted: #8a7a64;
    --accent: #d98a24;
    --lamp-off: #c9bda9;
    --track: #ddd0bb;
    --knob: #fffdf8;
    --secondary-hover: #e0d3bd;
    --glow: rgba(217, 138, 36, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  /* pool of light from an unseen ceiling lamp */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(60% 45% at 50% 0%, var(--glow), transparent 70%);
  }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  header .left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  header .left .toggle { flex: 0 0 auto; }
  #sensors {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .sensor-chip {
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 4px 10px;
    color: var(--muted);
  }
  .sensor-chip b { color: var(--text); font-weight: 600; margin-right: 6px; }
  header h1 { font-size: 19px; margin: 0; font-weight: 800; letter-spacing: -0.01em; }
  header .right { display: flex; align-items: center; gap: 12px; }
  header .status { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .iconbtn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 15px;
    cursor: pointer;
  }
  .iconbtn:hover { background: var(--panel2); }
  main { max-width: 760px; margin: 0 auto; padding: 16px; position: relative; }

  .room { margin-bottom: 28px; }
  .room > h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 0 0 8px 4px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .room > h2 .toggle { transform: scale(0.8); transform-origin: left center; }
  .room > h2 .chev {
    cursor: pointer;
    user-select: none;
    width: 14px;
    text-align: center;
  }
  .room > h2 .rname { cursor: pointer; user-select: none; }
  .room > h2 .zonebadge {
    font-family: var(--mono);
    font-size: 9px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
    opacity: 0.7;
  }
  .room .lights.collapsed { display: none; }
  .light {
    --lamp: var(--lamp-off);
    background: linear-gradient(105deg, color-mix(in srgb, var(--lamp) 8%, var(--panel)), var(--panel) 55%);
    border-radius: var(--radius);
    box-shadow: inset 3px 0 0 var(--lamp);
    padding: 12px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 18px 1fr auto auto;
    grid-template-areas:
      "dot name color toggle"
      "dot bri bri bri"
      "dot ct ct ct"
      "dot presets presets presets";
    gap: 6px 12px;
    align-items: center;
    transition: opacity 0.2s, box-shadow 0.4s, background 0.4s;
  }
  .light.off {
    opacity: 0.55;
    background: var(--panel);
    box-shadow: inset 3px 0 0 var(--lamp-off);
  }
  .light.unreachable { opacity: 0.35; }
  .dot {
    grid-area: dot;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--lamp);
    box-shadow: 0 0 12px var(--lamp);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .light.off .dot { background: var(--lamp-off); box-shadow: none; }
  .light .name { grid-area: name; font-size: 15px; }
  .light .name small { color: var(--muted); font-size: 11px; margin-left: 6px; }

  /* toggle switch */
  .toggle { grid-area: toggle; position: relative; width: 46px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .track {
    position: absolute; inset: 0;
    background: var(--track);
    border-radius: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle .track::before {
    content: "";
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: var(--knob);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .track { background: var(--accent); }
  .toggle input:checked + .track::before { transform: translateX(20px); }
  .toggle input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }

  .light .bri {
    grid-area: bri;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .light .bri svg { flex: 0 0 auto; opacity: 0.6; }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--track);
    outline-offset: 4px;
  }
  /* the brightness track fills toward the lamp's own light */
  .light .bri input[type="range"] {
    background: linear-gradient(to right, var(--track), color-mix(in srgb, var(--lamp) 70%, var(--track)));
  }
  .light.off .bri input[type="range"] { background: var(--track); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--lamp, var(--accent));
    cursor: pointer;
    border: none;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--lamp, var(--accent));
    cursor: pointer;
    border: none;
  }
  input[type="range"].ct {
    background: linear-gradient(to right, #ff9d3c, #fff4e0, #cfe3ff);
  }
  .ctwrap .kelvin {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: 8px;
    min-width: 48px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  input[type="color"] {
    grid-area: color;
    width: 36px; height: 28px;
    padding: 0;
    border: none;
    border-radius: 6px;
    background: none;
    cursor: pointer;
  }
  .ctwrap {
    grid-area: ct;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ctwrap input { flex: 1; }
  .presets { grid-area: presets; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .presets button {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .presets button:hover { border-color: var(--accent); color: var(--text); }
  .room > h2 { flex-wrap: wrap; }
  .room > h2 .presets { margin-left: auto; margin-top: 0; }

  /* reorder mode */
  .reorder-row {
    grid-template-columns: 1fr auto;
    grid-template-areas: "name move";
  }
  .movebtns { grid-area: move; display: flex; gap: 6px; }
  .movebtns button, .room h2 .movebtns button {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    width: 32px; height: 28px;
    font-size: 14px;
    cursor: pointer;
  }
  .movebtns button:hover { background: var(--panel2); }
  .movebtns button:disabled { opacity: 0.3; cursor: default; }
  input.rename {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--text);
    padding: 4px 8px;
    font-size: inherit;
    font-family: inherit;
    text-transform: none;
    letter-spacing: normal;
    width: 100%;
    max-width: 280px;
  }
  #reorder-hint {
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--muted);
  }

  /* cards / panels */
  .card {
    max-width: 420px;
    margin: 80px auto;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
  }
  .card h2 { margin-top: 0; }
  .card p { color: var(--muted); line-height: 1.5; }
  button.primary {
    background: var(--accent);
    color: #221302;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255, 177, 94, 0.25);
  }
  button.primary:disabled { opacity: 0.5; cursor: wait; box-shadow: none; }
  button.secondary {
    background: var(--panel2);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary:hover { background: var(--secondary-hover); }
  .msg { margin-top: 16px; font-size: 14px; min-height: 20px; }
  .msg.err { color: #ff8a76; }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    margin: 24px 0 16px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    border-top: 1px solid var(--line);
  }
  input[type="text"], input[type="password"] {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    width: 100%;
  }
  input[type="text"]:focus { border-color: var(--accent); outline: none; }
  .keyrow { display: flex; gap: 8px; margin-top: 8px; }
  .keyrow input { flex: 1; }

  /* settings */
  #settings {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
  }
  #settings .inner {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
  }
  #settings h2 { font-size: 15px; margin: 0 0 16px; }
  #settings section { margin-bottom: 20px; }
  #settings section:last-child { margin-bottom: 0; }
  #settings label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  #key-display {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    word-break: break-all;
    user-select: all;
  }
  #settings .btnrow { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  #settings .msg { margin-top: 8px; }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 24px 16px 32px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  .hidden { display: none !important; }
  #error-banner {
    background: #58241c;
    color: #ffd3c7;
    padding: 10px 20px;
    font-size: 13px;
  }

  @media (max-width: 520px) {
    header { padding: 12px 14px; }
    main { padding: 12px; }
    .room > h2 .presets { margin-left: 0; flex-basis: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="left">
    <h1>💡 Hue Control</h1>
    <label class="toggle hidden" id="all-toggle-wrap" title="All lights on/off">
      <input type="checkbox" id="all-toggle">
      <span class="track"></span>
    </label>
    <div id="sensors" class="hidden"></div>
  </div>
  <div class="right">
    <span class="status" id="status"></span>
    <button class="iconbtn" id="theme-btn" title="Switch bright/dark mode">☀</button>
    <button class="iconbtn" id="reorder-btn" title="Reorder rooms and lights">⇅</button>
    <button class="iconbtn" id="settings-btn" title="Settings">⚙</button>
  </div>
</header>

<div id="error-banner" class="hidden"></div>

<div id="pair" class="card hidden">
  <h2>Connect to Hue Bridge</h2>
  <p>Press the <strong>link button</strong> on your Hue bridge, then click below within 30 seconds.</p>
  <p id="https-note" class="hidden"></p>
  <div class="keyrow" style="margin-bottom: 16px">
    <input type="text" id="pair-ip-input" placeholder="Bridge IP" spellcheck="false">
  </div>
  <button class="primary" id="pair-btn">Pair with Bridge</button>
  <div class="divider">or use an existing key</div>
  <div class="keyrow">
    <input type="text" id="pair-key-input" placeholder="Paste app key" spellcheck="false">
    <button class="secondary" id="pair-key-btn">Use key</button>
  </div>
  <div class="msg" id="pair-msg"></div>
</div>

<div id="settings" class="hidden">
  <div class="inner">
    <h2>Settings</h2>
    <section>
      <label>Bridge IP</label>
      <div class="keyrow">
        <input type="text" id="ip-input" placeholder="192.168.x.x" spellcheck="false">
        <button class="secondary" id="ip-set-btn">Save</button>
      </div>
    </section>
    <section>
      <label>App key (use this to connect from another browser)</label>
      <div id="key-display">••••••••••••••••••••••••••••••••</div>
      <div class="btnrow">
        <button class="secondary" id="key-show-btn">Show</button>
        <button class="secondary" id="key-copy-btn">Copy</button>
      </div>
    </section>
    <section>
      <label>Replace app key</label>
      <div class="keyrow">
        <input type="text" id="key-input" placeholder="Paste app key" spellcheck="false">
        <button class="secondary" id="key-set-btn">Use key</button>
      </div>
      <div class="msg" id="settings-msg"></div>
    </section>
  </div>
</div>

<main id="rooms" class="hidden"></main>

<footer>
  Made by <a href="https://bill.seremetis.net">Bill Seremetis</a> with Anthropic Fable 5
  · <a href="https://github.com/bserem/hue-webui">GitHub</a>
</footer>

<script>
"use strict";

const DEFAULT_BRIDGE_IP = "192.168.2.2";
const IP_STORAGE = "hue-bridge-ip";
const KEY_STORAGE = "hue-app-key";
const ROOM_ORDER_STORAGE = "hue-room-order";
const LIGHT_ORDER_STORAGE = "hue-light-order";
const OTHER_ROOM_ID = "__other";
const REFRESH_MS = 5000;

// when the page itself is served over HTTPS, talk to the bridge over HTTPS
// too (self-signed cert — the user must accept it in the browser once);
// otherwise an HTTPS page could not fetch the http:// API (mixed content)
const BRIDGE_SCHEME = location.protocol === "https:" ? "https:" : "http:";

let bridgeIp = localStorage.getItem(IP_STORAGE) || DEFAULT_BRIDGE_IP;

const bridgeUrl = (path, ip = bridgeIp) => `${BRIDGE_SCHEME}//${ip}${path}`;

function certHint(ip = bridgeIp) {
  return BRIDGE_SCHEME === "https:"
    ? ` If you haven't yet, open https://${ip}/api/config in a new tab and accept the bridge's self-signed certificate.`
    : "";
}
let appKey = localStorage.getItem(KEY_STORAGE);
let refreshTimer = null;
// timestamp of the last slider/picker interaction; refresh pauses briefly
// after it so polling doesn't fight the user (counters proved leak-prone)
let lastInteraction = 0;
const INTERACT_GRACE_MS = 2500;
const markInteracting = () => { lastInteraction = Date.now(); };
let reorderMode = false;
let lastGroups = null;
let lastLights = null;

const $ = (sel) => document.querySelector(sel);

// ---------- API ----------

async function api(method, path, body) {
  const res = await fetch(bridgeUrl(`/api/${appKey}${path}`), {
    method,
    body: body ? JSON.stringify(body) : undefined,
  });
  return res.json();
}

async function saveBridgeIp(ip, msgEl) {
  ip = ip.trim();
  if (!ip || ip === bridgeIp) return true;
  msgEl.classList.remove("err");
  msgEl.textContent = "Checking bridge…";
  try {
    const res = await fetch(bridgeUrl("/api/config", ip)); // unauthenticated endpoint
    const cfg = await res.json();
    if (!cfg.bridgeid) throw new Error("Not a Hue bridge");
    bridgeIp = ip;
    localStorage.setItem(IP_STORAGE, ip);
    msgEl.textContent = `Found bridge "${cfg.name}".`;
    return true;
  } catch (e) {
    msgEl.classList.add("err");
    msgEl.textContent = `No bridge at ${ip}: ${e.message}.${certHint(ip)}`;
    return false;
  }
}

// PUT to /lights/<id> or /groups/<id>; bridge answers [{success|error}]
async function rename(path, name) {
  const res = await api("PUT", path, { name });
  const err = Array.isArray(res) && res.find((r) => r.error);
  if (err) throw new Error(err.error.description);
}

async function validateKey(key) {
  const res = await fetch(bridgeUrl(`/api/${key}/lights`));
  const data = await res.json();
  if (Array.isArray(data) && data[0] && data[0].error) {
    throw new Error(data[0].error.description || "Key rejected by bridge");
  }
  return true;
}

async function adoptKey(key, msgEl) {
  key = key.trim();
  if (!key) return;
  msgEl.classList.remove("err");
  msgEl.textContent = "Checking key…";
  try {
    await validateKey(key);
    appKey = key;
    localStorage.setItem(KEY_STORAGE, key);
    msgEl.textContent = "Key accepted.";
    closeSettings();
    start();
  } catch (e) {
    msgEl.classList.add("err");
    msgEl.textContent = `Failed: ${e.message}.${certHint()}`;
  }
}

async function pair() {
  const btn = $("#pair-btn");
  const msg = $("#pair-msg");
  btn.disabled = true;
  if (!(await saveBridgeIp($("#pair-ip-input").value, msg))) {
    btn.disabled = false;
    return;
  }
  msg.classList.remove("err");
  msg.textContent = "Pairing…";
  try {
    const res = await fetch(bridgeUrl("/api"), {
      method: "POST",
      body: JSON.stringify({ devicetype: "hueui#browser" }),
    });
    const data = await res.json();
    if (data[0] && data[0].success) {
      appKey = data[0].success.username;
      localStorage.setItem(KEY_STORAGE, appKey);
      msg.textContent = "Paired!";
      start();
    } else if (data[0] && data[0].error && data[0].error.type === 101) {
      msg.classList.add("err");
      msg.textContent = "Link button not pressed. Press it on the bridge, then try again.";
    } else {
      throw new Error(data[0] && data[0].error ? data[0].error.description : "Unknown response");
    }
  } catch (e) {
    msg.classList.add("err");
    msg.textContent = `Failed: ${e.message}.${certHint()}`;
  } finally {
    btn.disabled = false;
  }
}

// ---------- color conversions ----------

// Hue API: hue 0–65535, sat 0–254, bri 1–254, ct 153–500 mireds

function hexToHueSat(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h = (h * 60 + 360) % 360;
  }
  const s = max === 0 ? 0 : d / max;
  return {
    hue: Math.round(h / 360 * 65535),
    sat: Math.round(s * 254),
  };
}

function hueSatToHex(hue, sat) {
  const h = hue / 65535 * 360;
  const s = sat / 254;
  const v = 1; // full value so picker shows the chroma, not dimming
  const c = v * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = v - c;
  let r, g, b;
  if (h < 60)       [r, g, b] = [c, x, 0];
  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else              [r, g, b] = [c, 0, x];
  const toHex = (n) => Math.round((n + m) * 255).toString(16).padStart(2, "0");
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

function ctToHex(ct) {
  // rough mired → warm/cool tint for the status dot
  const t = (ct - 153) / (500 - 153); // 0 cool, 1 warm
  const r = Math.round(200 + t * 55);
  const g = Math.round(220 - t * 60);
  const b = Math.round(255 - t * 160);
  return `#${[r, g, b].map(n => n.toString(16).padStart(2, "0")).join("")}`;
}

function lightDisplayColor(state) {
  if (!state.on) return "#483e33"; // matches --lamp-off
  if (state.colormode === "ct" && state.ct) return ctToHex(state.ct);
  if (state.hue !== undefined && state.sat !== undefined) return hueSatToHex(state.hue, state.sat);
  return "#ffe9c4";
}

// ---------- ordering ----------

function loadJSON(key, fallback) {
  try {
    return JSON.parse(localStorage.getItem(key)) ?? fallback;
  } catch {
    return fallback;
  }
}

// saved order first, unknown ids appended sorted by name
function orderedSort(ids, saved, nameOf) {
  return ids.slice().sort((a, b) => {
    const ia = saved.indexOf(a), ib = saved.indexOf(b);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return 1;
    return nameOf(a).localeCompare(nameOf(b));
  });
}

// rooms and zones (incl. "Other") with their light ids, in display order
function roomList(groups, lights) {
  const rooms = Object.entries(groups)
    .filter(([, g]) => g.type === "Room" || g.type === "Zone")
    .map(([id, g]) => ({ id, name: g.name, type: g.type, lightIds: g.lights.filter((l) => lights[l]) }))
    .filter((r) => r.lightIds.length > 0);

  const assigned = new Set(rooms.flatMap((r) => r.lightIds));
  const orphans = Object.keys(lights).filter((id) => !assigned.has(id));
  if (orphans.length) rooms.push({ id: OTHER_ROOM_ID, name: "Other", lightIds: orphans });

  const roomOrder = loadJSON(ROOM_ORDER_STORAGE, []);
  const byId = new Map(rooms.map((r) => [r.id, r]));
  const sortedIds = orderedSort([...byId.keys()], roomOrder, (id) => byId.get(id).name);

  const lightOrders = loadJSON(LIGHT_ORDER_STORAGE, {});
  return sortedIds.map((id) => {
    const r = byId.get(id);
    r.lightIds = orderedSort(r.lightIds, lightOrders[r.id] || [], (l) => lights[l].name);
    return r;
  });
}

const COLLAPSED_STORAGE = "hue-collapsed-rooms";

function collapsedRooms() {
  return new Set(loadJSON(COLLAPSED_STORAGE, []));
}

function toggleRoomCollapsed(roomId) {
  const set = collapsedRooms();
  if (set.has(roomId)) set.delete(roomId);
  else set.add(roomId);
  localStorage.setItem(COLLAPSED_STORAGE, JSON.stringify([...set]));
  render(lastGroups, lastLights);
}

function moveRoom(roomId, dir) {
  const ids = roomList(lastGroups, lastLights).map((r) => r.id);
  const i = ids.indexOf(roomId);
  const j = i + dir;
  if (i === -1 || j < 0 || j >= ids.length) return;
  [ids[i], ids[j]] = [ids[j], ids[i]];
  localStorage.setItem(ROOM_ORDER_STORAGE, JSON.stringify(ids));
  render(lastGroups, lastLights);
}

function moveLight(roomId, lightId, dir) {
  const room = roomList(lastGroups, lastLights).find((r) => r.id === roomId);
  if (!room) return;
  const ids = room.lightIds;
  const i = ids.indexOf(lightId);
  const j = i + dir;
  if (i === -1 || j < 0 || j >= ids.length) return;
  [ids[i], ids[j]] = [ids[j], ids[i]];
  const lightOrders = loadJSON(LIGHT_ORDER_STORAGE, {});
  lightOrders[roomId] = ids;
  localStorage.setItem(LIGHT_ORDER_STORAGE, JSON.stringify(lightOrders));
  render(lastGroups, lastLights);
}

// ---------- presets ----------

// white-light recipes (mireds), ordered by kelvin warm → cool
const PRESETS = [
  { name: "Rest",        ct: 454, bri: 77 },   // 2200 K, dim
  { name: "Relax",       ct: 447, bri: 144 },  // 2250 K
  { name: "Bright",      ct: 370, bri: 254 },  // 2700 K
  { name: "Read",        ct: 346, bri: 254 },  // 2900 K
  { name: "Concentrate", ct: 233, bri: 254 },  // 4300 K
  { name: "Cool bright", ct: 153, bri: 254 },  // 6500 K
];

function presetButtons(apply) {
  const wrap = document.createElement("div");
  wrap.className = "presets";
  for (const p of PRESETS) {
    const b = document.createElement("button");
    b.textContent = p.name;
    b.title = `${Math.round(1e6 / p.ct / 100) * 100} K`;
    b.addEventListener("click", () => apply({ on: true, ct: p.ct, bri: p.bri }));
    wrap.appendChild(b);
  }
  return wrap;
}

// ---------- rendering ----------

function supportsColor(light) {
  return light.state.hue !== undefined && light.state.sat !== undefined;
}
function supportsCT(light) {
  return light.state.ct !== undefined;
}
function supportsBri(light) {
  return light.state.bri !== undefined;
}

function debounce(fn, ms) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}

function moveButtons(onUp, onDown, onRename) {
  const wrap = document.createElement("span");
  wrap.className = "movebtns";
  if (onRename) {
    const edit = document.createElement("button");
    edit.textContent = "✏";
    edit.title = "Rename";
    edit.addEventListener("click", onRename);
    wrap.appendChild(edit);
  }
  const up = document.createElement("button");
  up.textContent = "↑";
  up.addEventListener("click", onUp);
  const down = document.createElement("button");
  down.textContent = "↓";
  down.addEventListener("click", onDown);
  wrap.append(up, down);
  return wrap;
}

// swap nameEl content for a text input; Enter/blur saves, Escape cancels
function startRename(nameEl, currentName, save) {
  const input = document.createElement("input");
  input.type = "text";
  input.className = "rename";
  input.value = currentName;
  input.maxLength = 32; // bridge limit
  nameEl.replaceChildren(input);
  input.focus();
  input.select();
  let done = false;
  const finish = async (commit) => {
    if (done) return;
    done = true;
    const newName = input.value.trim();
    if (commit && newName && newName !== currentName) {
      try {
        await save(newName);
        hideError();
      } catch (e) {
        showError(`Rename failed: ${e.message}`);
      }
    }
    render(lastGroups, lastLights);
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") finish(true);
    else if (e.key === "Escape") finish(false);
  });
  input.addEventListener("blur", () => finish(true));
}

function buildLightCard(id, light) {
  const card = document.createElement("div");
  card.className = "light";
  card.dataset.id = id;

  const dot = document.createElement("span");
  dot.className = "dot";
  card.appendChild(dot);

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = light.name;
  card.appendChild(name);

  // on/off toggle
  const toggle = document.createElement("label");
  toggle.className = "toggle";
  const cb = document.createElement("input");
  cb.type = "checkbox";
  const track = document.createElement("span");
  track.className = "track";
  toggle.append(cb, track);
  card.appendChild(toggle);
  cb.addEventListener("change", () => setState(id, { on: cb.checked }));

  // color picker or CT slider
  if (supportsColor(light)) {
    const picker = document.createElement("input");
    picker.type = "color";
    picker.title = "Color";
    picker.addEventListener("input", debounce(() => {
      const { hue, sat } = hexToHueSat(picker.value);
      setState(id, { on: true, hue, sat });
    }, 200));
    picker.addEventListener("pointerdown", markInteracting);
    picker.addEventListener("input", markInteracting);
    card.appendChild(picker);
    card._picker = picker;
  }
  // CT slider for ambiance and color lamps alike (white mode)
  if (supportsCT(light)) {
    const wrap = document.createElement("div");
    wrap.className = "ctwrap";
    const ct = document.createElement("input");
    ct.type = "range";
    ct.className = "ct";
    // slider works in kelvin (K = 1e6 / mired); bridge min mired = coolest
    const miredMin = light.capabilities?.control?.ct?.min ?? 153;
    const miredMax = light.capabilities?.control?.ct?.max ?? 454;
    ct.min = Math.ceil(1e6 / miredMax / 100) * 100;
    ct.max = Math.floor(1e6 / miredMin / 100) * 100;
    ct.step = 100;
    ct.title = "Color temperature";
    const kelvin = document.createElement("span");
    kelvin.className = "kelvin";
    const send = debounce(() => {
      setState(id, { on: true, ct: Math.round(1e6 / Number(ct.value)) });
    }, 200);
    ct.addEventListener("input", () => {
      markInteracting();
      kelvin.textContent = `${ct.value} K`;
      send();
    });
    ct.addEventListener("pointerdown", markInteracting);
    wrap.append(ct, kelvin);
    card.appendChild(wrap);
    card._ct = ct;
    card._kelvin = kelvin;
    card.appendChild(presetButtons((state) => setState(id, state)));
  }

  // brightness slider
  if (supportsBri(light)) {
    const briWrap = document.createElement("div");
    briWrap.className = "bri";
    briWrap.innerHTML =
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
      '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
    const bri = document.createElement("input");
    bri.type = "range";
    bri.min = 1;
    bri.max = 254;
    bri.title = "Brightness";
    bri.addEventListener("input", debounce(() => {
      setState(id, { on: true, bri: Number(bri.value) });
    }, 200));
    bri.addEventListener("pointerdown", markInteracting);
    bri.addEventListener("input", markInteracting);
    briWrap.appendChild(bri);
    card.appendChild(briWrap);
    card._bri = bri;
  }

  card._dot = dot;
  card._cb = cb;
  return card;
}

function buildReorderRow(roomId, lightId, light) {
  const row = document.createElement("div");
  row.className = "light reorder-row";
  const name = document.createElement("div");
  name.className = "name";
  name.textContent = light.name;
  row.appendChild(name);
  row.appendChild(moveButtons(
    () => moveLight(roomId, lightId, -1),
    () => moveLight(roomId, lightId, +1),
    () => startRename(name, light.name, async (newName) => {
      await rename(`/lights/${lightId}`, newName);
      lastLights[lightId].name = newName;
    }),
  ));
  return row;
}

function updateLightCard(card, light) {
  const s = light.state;
  card.classList.toggle("off", !s.on);
  card.classList.toggle("unreachable", !s.reachable);
  card._cb.checked = !!s.on;
  card.style.setProperty("--lamp", lightDisplayColor(s));
  if (card._bri && s.bri !== undefined) card._bri.value = s.bri;
  if (card._picker && s.hue !== undefined) card._picker.value = hueSatToHex(s.hue, s.sat);
  if (card._ct && s.ct) {
    const k = Math.round(1e6 / s.ct / 100) * 100;
    card._ct.value = k;
    card._kelvin.textContent = `${k} K`;
  }
}

// a light can appear in its room and in any number of zones, so cards are
// keyed by "<group id>/<light id>"; card.dataset.id holds the light id
const cards = new Map();
const roomToggles = new Map(); // room id -> { cb, lightIds }

// reflect an on/off change in every card of the given lights right away;
// the bridge applies group actions with a small delay, so the immediate
// refresh after a PUT can still read the old state
function applyOnOptimistically(lightIds, on) {
  for (const card of cards.values()) {
    if (lightIds.includes(card.dataset.id)) {
      card._cb.checked = on;
      card.classList.toggle("off", !on);
    }
  }
}

function refreshSoon() {
  refresh();
  setTimeout(refresh, 1500);
}

async function setRoomState(roomId, lightIds, state) {
  try {
    if (roomId === OTHER_ROOM_ID) {
      // no bridge group behind "Other" — address its lights one by one
      await Promise.all(lightIds.map((id) => api("PUT", `/lights/${id}/state`, state)));
    } else {
      await api("PUT", `/groups/${roomId}/action`, state);
    }
    if (state.on !== undefined) applyOnOptimistically(lightIds, state.on);
    refreshSoon();
  } catch (e) {
    showError(`Failed to switch room: ${e.message}`);
  }
}

let renderSig = "";

function render(groups, lights) {
  renderSig = layoutSignature(groups, lights);
  const main = $("#rooms");
  main.innerHTML = "";
  cards.clear();
  roomToggles.clear();

  if (reorderMode) {
    const hint = document.createElement("div");
    hint.id = "reorder-hint";
    hint.textContent = "Edit mode — use the arrows to move rooms and lights, ✏ to rename, then press ⇅ again to finish. Order is saved in this browser; names are saved on the bridge.";
    main.appendChild(hint);
  }

  const collapsed = reorderMode ? new Set() : collapsedRooms();

  for (const room of roomList(groups, lights)) {
    const isCollapsed = collapsed.has(room.id);
    const section = document.createElement("section");
    section.className = "room";
    const h = document.createElement("h2");
    const roomName = document.createElement("span");
    roomName.className = "rname";
    roomName.textContent = room.name;
    if (!reorderMode) {
      const chev = document.createElement("span");
      chev.className = "chev";
      chev.textContent = isCollapsed ? "▸" : "▾";
      chev.addEventListener("click", () => toggleRoomCollapsed(room.id));
      roomName.addEventListener("click", () => toggleRoomCollapsed(room.id));
      h.appendChild(chev);
    }
    h.appendChild(roomName);
    if (room.type === "Zone") {
      const badge = document.createElement("span");
      badge.className = "zonebadge";
      badge.textContent = "zone";
      h.appendChild(badge);
    }
    if (!reorderMode) {
      const t = document.createElement("label");
      t.className = "toggle";
      t.title = `${room.name} on/off`;
      const cb = document.createElement("input");
      cb.type = "checkbox";
      const track = document.createElement("span");
      track.className = "track";
      t.append(cb, track);
      cb.checked = room.lightIds.some((id) => lights[id].state.on);
      cb.addEventListener("change", () => setRoomState(room.id, room.lightIds, { on: cb.checked }));
      h.appendChild(t);
      roomToggles.set(room.id, { cb, lightIds: room.lightIds });
      if (room.lightIds.some((id) => supportsCT(lights[id]))) {
        h.appendChild(presetButtons((state) => setRoomState(room.id, room.lightIds, state)));
      }
    }
    if (reorderMode) {
      h.appendChild(moveButtons(
        () => moveRoom(room.id, -1),
        () => moveRoom(room.id, +1),
        room.id === OTHER_ROOM_ID ? null : () => startRename(roomName, room.name, async (newName) => {
          await rename(`/groups/${room.id}`, newName);
          lastGroups[room.id].name = newName;
        }),
      ));
    }
    section.appendChild(h);
    const lightsWrap = document.createElement("div");
    lightsWrap.className = "lights" + (isCollapsed ? " collapsed" : "");
    for (const id of room.lightIds) {
      let el;
      if (reorderMode) {
        el = buildReorderRow(room.id, id, lights[id]);
      } else {
        el = buildLightCard(id, lights[id]);
        updateLightCard(el, lights[id]);
        cards.set(`${room.id}/${id}`, el);
      }
      lightsWrap.appendChild(el);
    }
    section.appendChild(lightsWrap);
    main.appendChild(section);
  }
}

// ---------- sensors ----------

// Hue motion sensors are three bridge sensors sharing one device MAC
// (uniqueid prefix): ZLLPresence (carries the user-given name),
// ZLLTemperature (0.01 °C) and ZLLLightLevel (10000*log10(lux)+1).
function renderSensors(sensors) {
  const el = $("#sensors");
  const devices = new Map();
  for (const s of Object.values(sensors)) {
    if (!s.uniqueid || !s.type.startsWith("ZLL")) continue;
    const mac = s.uniqueid.split("-")[0];
    if (!devices.has(mac)) devices.set(mac, {});
    const d = devices.get(mac);
    if (s.type === "ZLLPresence") d.name = s.name;
    else if (s.type === "ZLLTemperature") d.temp = s.state.temperature;
    else if (s.type === "ZLLLightLevel") d.light = s.state.lightlevel;
  }
  const chips = [];
  for (const d of devices.values()) {
    const parts = [];
    if (d.temp != null) parts.push(`${(d.temp / 100).toFixed(1)} °C`);
    if (d.light != null) parts.push(`${Math.round(10 ** ((d.light - 1) / 10000))} lx`);
    if (parts.length) chips.push({ name: d.name || "Sensor", text: parts.join(" · ") });
  }
  chips.sort((a, b) => a.name.localeCompare(b.name));
  el.replaceChildren(...chips.map((c) => {
    const chip = document.createElement("span");
    chip.className = "sensor-chip";
    const b = document.createElement("b");
    b.textContent = c.name;
    chip.append(b, c.text);
    return chip;
  }));
  el.classList.toggle("hidden", chips.length === 0);
}

// ---------- state ----------

async function setState(id, state) {
  try {
    await api("PUT", `/lights/${id}/state`, state);
    // optimistic local update of every card showing this light
    if (state.on !== undefined) {
      for (const card of cards.values()) {
        if (card.dataset.id === id) {
          card._cb.checked = state.on;
          card.classList.toggle("off", !state.on);
        }
      }
    }
  } catch (e) {
    showError(`Failed to update light: ${e.message}`);
  }
}

let rendered = false;

async function refresh() {
  if (Date.now() - lastInteraction < INTERACT_GRACE_MS || reorderMode) return;
  try {
    const [lights, groups, sensors] = await Promise.all([
      api("GET", "/lights"),
      api("GET", "/groups"),
      api("GET", "/sensors"),
    ]);
    if (Array.isArray(lights) && lights[0] && lights[0].error) {
      if (lights[0].error.type === 1) { // unauthorized — key revoked
        localStorage.removeItem(KEY_STORAGE);
        appKey = null;
        showPairing();
        return;
      }
      throw new Error(lights[0].error.description);
    }
    hideError();
    lastGroups = groups;
    lastLights = lights;
    if (!Array.isArray(sensors)) renderSensors(sensors);
    $("#all-toggle").checked = Object.values(lights).some((l) => l.state.on);
    if (!rendered || layoutSignature(groups, lights) !== renderSig) {
      render(groups, lights);
      rendered = true;
    } else {
      for (const card of cards.values()) {
        const light = lights[card.dataset.id];
        if (light) updateLightCard(card, light);
      }
      for (const t of roomToggles.values()) {
        t.cb.checked = t.lightIds.some((id) => lights[id]?.state.on);
      }
    }
    $("#status").textContent =
      `${Object.keys(lights).length} lights · ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    showError(`Bridge unreachable at ${bridgeIp}: ${e.message}.${certHint()}`);
  }
}

// detects added/removed/regrouped lights and rooms/zones
function layoutSignature(groups, lights) {
  return JSON.stringify(roomList(groups, lights).map((r) => [r.id, r.lightIds]));
}

// ---------- UI plumbing ----------

function showError(msg) {
  const b = $("#error-banner");
  b.textContent = msg;
  b.classList.remove("hidden");
}
function hideError() {
  $("#error-banner").classList.add("hidden");
}

function showPairing() {
  rendered = false;
  $("#pair-ip-input").value = bridgeIp;
  if (BRIDGE_SCHEME === "https:") {
    $("#https-note").textContent =
      `You are on HTTPS, so the bridge is reached over its self-signed certificate.${certHint()}`;
    $("#https-note").classList.remove("hidden");
  }
  $("#rooms").classList.add("hidden");
  $("#settings").classList.add("hidden");
  $("#pair").classList.remove("hidden");
  $("#reorder-btn").classList.add("hidden");
  $("#settings-btn").classList.add("hidden");
  $("#sensors").classList.add("hidden");
  $("#all-toggle-wrap").classList.add("hidden");
  clearInterval(refreshTimer);
}

function start() {
  $("#pair").classList.add("hidden");
  $("#rooms").classList.remove("hidden");
  $("#reorder-btn").classList.remove("hidden");
  $("#settings-btn").classList.remove("hidden");
  $("#all-toggle-wrap").classList.remove("hidden");
  refresh();
  clearInterval(refreshTimer);
  refreshTimer = setInterval(refresh, REFRESH_MS);
}

// settings panel

let keyVisible = false;

function renderKeyDisplay() {
  $("#key-display").textContent = keyVisible && appKey
    ? appKey
    : "•".repeat(Math.max(appKey ? appKey.length : 32, 16));
  $("#key-show-btn").textContent = keyVisible ? "Hide" : "Show";
}

function openSettings() {
  keyVisible = false;
  renderKeyDisplay();
  $("#settings-msg").textContent = "";
  $("#key-input").value = "";
  $("#ip-input").value = bridgeIp;
  $("#settings").classList.remove("hidden");
  $("#rooms").classList.add("hidden");
}

function closeSettings() {
  $("#settings").classList.add("hidden");
  $("#rooms").classList.remove("hidden");
}

$("#settings-btn").addEventListener("click", () => {
  if ($("#settings").classList.contains("hidden")) openSettings();
  else closeSettings();
});

$("#key-show-btn").addEventListener("click", () => {
  keyVisible = !keyVisible;
  renderKeyDisplay();
});

$("#key-copy-btn").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(appKey);
    $("#key-copy-btn").textContent = "Copied!";
  } catch {
    // clipboard API unavailable (e.g. file:// in some browsers) — reveal for manual copy
    keyVisible = true;
    renderKeyDisplay();
    $("#key-copy-btn").textContent = "Select & copy above";
  }
  setTimeout(() => { $("#key-copy-btn").textContent = "Copy"; }, 2000);
});

$("#key-set-btn").addEventListener("click", () => adoptKey($("#key-input").value, $("#settings-msg")));

$("#ip-set-btn").addEventListener("click", async () => {
  if (await saveBridgeIp($("#ip-input").value, $("#settings-msg"))) refresh();
});

async function pairWithKey() {
  if (!(await saveBridgeIp($("#pair-ip-input").value, $("#pair-msg")))) return;
  adoptKey($("#pair-key-input").value, $("#pair-msg"));
}
$("#pair-key-btn").addEventListener("click", pairWithKey);
$("#pair-key-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") pairWithKey();
});

// reorder mode

$("#reorder-btn").addEventListener("click", () => {
  reorderMode = !reorderMode;
  $("#reorder-btn").style.background = reorderMode ? "var(--accent)" : "";
  $("#reorder-btn").style.color = reorderMode ? "#1a1206" : "";
  closeSettings();
  if (lastGroups && lastLights) render(lastGroups, lastLights);
  if (!reorderMode) refresh();
});

// bright/dark UI mode

const THEME_STORAGE = "hue-ui-theme";
let theme = localStorage.getItem(THEME_STORAGE) || "dark";

function applyTheme() {
  document.body.classList.toggle("bright", theme === "bright");
  $("#theme-btn").textContent = theme === "bright" ? "☾" : "☀";
}

$("#theme-btn").addEventListener("click", () => {
  theme = theme === "bright" ? "dark" : "bright";
  localStorage.setItem(THEME_STORAGE, theme);
  applyTheme();
});

applyTheme();

// master switch: group 0 addresses every light on the bridge
$("#all-toggle").addEventListener("change", async (e) => {
  try {
    await api("PUT", "/groups/0/action", { on: e.target.checked });
    applyOnOptimistically([...cards.values()].map((c) => c.dataset.id), e.target.checked);
    for (const t of roomToggles.values()) t.cb.checked = e.target.checked;
    refreshSoon();
  } catch (err) {
    showError(`Failed to switch all lights: ${err.message}`);
  }
});

$("#pair-btn").addEventListener("click", pair);

if (appKey) start();
else showPairing();
</script>
